<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>りずにゃんクラブ</title>
<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}
.hero{
    height:100vh;
    background:
    linear-gradient(
        rgba(0,0,0,0.5),
        rgba(0,0,0,0.9)
    ),
    url("IMG_2637.jpeg");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}
.hero h1{
    font-size:48px;
    margin-bottom:10px;
    letter-spacing:4px;
}
.hero p{
    opacity:0.8;
    max-width:500px;
    line-height:1.8;
}
.button-group{
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}
.button{
    padding:12px 28px;
    border:1px solid rgba(255,255,255,0.4);
    color:white;
    text-decoration:none;
    transition:0.3s;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(5px);
}
.button:hover{
    background:white;
    color:black;
}
.section{
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
}
.section h2{
    font-size:36px;
    margin-bottom:40px;
    border-left:4px solid #00aaff;
    padding-left:15px;
}
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:25px;
    margin-bottom:40px;
}
.card h3{
    margin-top:0;
    font-size:28px;
}
.card p{
    line-height:1.8;
    opacity:0.85;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    margin-top:20px;
    justify-items:center;
}
.gallery img{
    width:100%;
    max-width:150px;
    height:90px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    transition:0.3s;
}
.gallery img:hover{
    transform:scale(1.03);
}
}
.gallery img:hover{
    transform:scale(1.03);
}
.member-grid{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}
.member-card{
    width:220px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    text-align:center;
}
.member-card h3{
    margin-bottom:10px;
}
footer{
    padding:40px 20px;
    text-align:center;
    opacity:0.5;
    font-size:14px;
}
</style>
</head>
<body>
<div class="hero">
    <h1>りずにゃんクラブ</h1>
    <p>
        VRChatを中心に活動するコミュニティ。<br>
        初心者から常連まで、みんなで楽しく遊ぶことをコンセプトに活動しています。
    </p>
    <div class="button-group">
        <a class="button"
        href="https://x.com/rizu45_vrc?s=11&t=kEKwr-6pD3eoYZtbXhb_TA"
        target="_blank">
        SOCIAL
        </a>
        <a class="button"
        href="https://discord.gg/Jf4RVYAj"
        target="_blank">
        COMMUNITY
        </a>
    </div>
</div>
<div class="section">
    <h2>ABOUT</h2>
    <div class="card">
        <p>
            りずにゃんクラブは、VRChatを中心に活動するコミュニティです。<br><br>
            初心者さんを中心に、みんなで楽しく遊ぶことをコンセプトに活動しています。<br>
            目指せ世界平和！
        </p>
    </div>
</div>
<div class="section">
    <h2>ACTIVITY</h2>
    <div class="card">
        <h3>しゅわしゅわ会</h3>
        <p>
            毎週金曜日開催の交流イベント。分かりやすくいうとVR飲み会です。<br>
            ※飲酒は20歳になってから
        </p>
        <div class="gallery">
            <img src="IMG_2637.jpeg">
            <img src="IMG_2729.jpeg">
            <img src="IMG_2730.jpeg">
            <img src="IMG_2731.jpeg">
        </div>
    </div>
</div>
<div class="section">
    <h2>MEMBER</h2>
    <div class="member-grid">
        <div class="member-card">
            <h3>りずにゃん</h3>
            <p>
                OWNER
            </p>
        </div>
    </div>
</div>
<footer>
    © rizunyan club
</footer>
</body>
</html>
