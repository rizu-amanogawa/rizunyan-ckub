<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>今日のおすすめ</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
}

.container{
    width:90%;
    max-width:700px;
    margin:0 auto;
    padding:40px 0;
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.sub{
    color:#aaa;
    margin-bottom:40px;
}

.video-card{
    background:#111;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
}

.video-card img{
    width:100%;
    display:block;
}

.video-info{
    padding:20px;
}

.video-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.video-text{
    color:#aaa;
    margin-bottom:20px;
}

.watch-button{
    display:inline-block;
    padding:12px 24px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    text-decoration:none;
}

.back{
    margin-top:40px;
}

.back a{
    color:#aaa;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>今日のおすすめ動画</h1>

<div class="sub">
毎回ランダムで1本表示されます。
</div>

<div id="video-area"></div>

<div class="back">
<a href="index.html">← トップページへ戻る</a>
</div>

</div>

<script>

const videos = [

{
title:"レッツゴー！陰陽師",
text:"ニコニコ動画を象徴する伝説級MAD。",
url:"https://www.nicovideo.jp/watch/sm9",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/9/9"
},

{
title:"患部で止まってすぐ溶ける",
text:"東方MAD文化を代表する超人気動画。",
url:"https://www.nicovideo.jp/watch/sm201996",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/201996/201996"
},

{
title:"エアーマンが倒せない",
text:"ネット歌曲の超定番。",
url:"https://www.nicovideo.jp/watch/sm350170",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/350170/350170"
},

{
title:"最終鬼畜妹フランドール・S",
text:"東方アレンジの代表格。",
url:"https://www.nicovideo.jp/watch/sm1849248",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/1849248/1849248"
},

{
title:"Nyanyanyanyanyanyanya!",
text:"ボカロ中毒ソング。",
url:"https://www.nicovideo.jp/watch/sm11509720",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/11509720/11509720"
},

{
title:"男女",
text:"ニコニコ全体の祭り動画。",
url:"https://www.nicovideo.jp/watch/sm2097776",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/2097776/2097776"
},

{
title:"Bad Apple!! PV",
text:"東方PVの歴史的作品。",
url:"https://www.nicovideo.jp/watch/sm8628149",
image:"https://nicovideo.cdn.nimg.jp/thumbnails/8628149/8628149"
}

];

const randomVideo =
videos[Math.floor(Math.random() * videos.length)];

document.getElementById("video-area").innerHTML = `

<div class="video-card">

<img src="${randomVideo.image}">

<div class="video-info">

<div class="video-title">
${randomVideo.title}
</div>

<div class="video-text">
${randomVideo.text}
</div>

<a class="watch-button"
href="${randomVideo.url}"
target="_blank">

動画を見る

</a>

</div>
</div>

`;

</script>

</body>
</html>
