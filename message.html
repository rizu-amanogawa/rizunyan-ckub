<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<meta name="description"
content="りずにゃんクラブ ご挨拶">
<title>
りずにゃんクラブ | ご挨拶
</title>
<style>
html{
    scroll-behavior:smooth;
}
*{
    box-sizing:border-box;
}
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}
.hero{
    min-height:26vh;
    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.88)
    ),
    url("IMG_2733.jpeg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}
.hero h1{
    font-size:clamp(34px, 9vw, 56px);
    margin:0;
}
.section{
    max-width:720px;
    margin:auto;
    padding:40px 18px;
}
.message-box{
    background:#0d0d0d;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:24px;
    overflow:hidden;
}
.message-box img{
    width:100%;
    border-radius:18px;
    margin-bottom:22px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,0.08);
}
.name{
    text-align:center;
    margin-bottom:36px;
}
.name h2{
    margin:0;
    font-size:34px;
}
.name p{
    margin-top:10px;
    opacity:0.7;
    font-size:14px;
}
.message{
    line-height:2.1;
    font-size:16px;
    opacity:0.95;
}
.message p{
    margin-bottom:36px;
}
.link-button{
    width:100%;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#101010;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:bold;
    margin-top:34px;
    transition:0.25s;
}
.link-button:hover{
    border-color:#00aaff;
    background:#151515;
}
footer{
    padding:28px 10px;
    text-align:center;
    opacity:0.45;
    font-size:11px;
}
</style>
</head>
<body>
<div class="hero">
    <h1>
        ご挨拶
    </h1>
</div>
<div class="section">
    <div class="message-box">
        <img src="IMG_2735.jpeg">
        <div class="name">
            <h2>
                天野河りず
            </h2>
            <p>
                りずにゃんクラブ オーナー
            </p>
        </div>
        <div class="message">
            <p>
                りずにゃんクラブは、
                VRChatを通じた交流を目的として活動しているコミュニティです。
            </p>
            <p>
                初心者の方でも気軽に参加できる空間づくりを大切にし、
                ワールド巡りや交流イベントを中心に活動しています。
            </p>
            <p>
                VRChatには、
                人との出会いや交流を楽しめる魅力があります。<br><br>
                このコミュニティが、
                誰かにとって「安心して遊べる場所」になれば嬉しく思います。
            </p>
            <p>
                これからも、
                楽しく穏やかなコミュニティづくりを目指して活動していきます。<br><br>
                今後ともよろしくお願いいたします。
            </p>
        </div>
    </div>
    <a class="link-button"
    href="./index.html#about">
    トップへ戻る
    </a>
</div>
<footer>
    © rizunyan club
</footer>
</body>
</html>
