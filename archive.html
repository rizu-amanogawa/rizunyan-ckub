html{
    scroll-behavior:smooth;

body{
    margin:0;

/* ---------- HEADER ---------- */

.header{
    padding:42px 16px 18px;
    text-align:center;
}

.header h1{
    font-size:clamp(34px, 9vw, 52px);
    margin:0 0 8px 0;
    line-height:1.2;
}

.header p{
    opacity:0.7;
    font-size:13px;

}

/* ---------- SECTION ---------- */

.year-section{
    max-width:520px;
    margin:auto;

}

.year-title{
    font-size:clamp(24px, 7vw, 38px);

    margin-top:0;
    margin-bottom:12px;

    border-left:4px solid #00aaff;
    padding-left:10px;

    line-height:1.1;
}

/* ---------- GRID ---------- */

.archive-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

/* ---------- CARD ---------- */

.archive-card{
    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:16px;

    overflow:hidden;

    transition:0.25s;

    backdrop-filter:blur(6px);
}

.archive-card:hover{
    transform:translateY(-2px);
}

.archive-card img{
    width:100%;

    height:180px;

    object-fit:cover;

    display:block;
}

/* ---------- CONTENT ---------- */

.archive-content{
    padding:14px;
}

.archive-date{
    opacity:0.55;

    margin-bottom:6px;

    font-size:11px;

    letter-spacing:0.5px;
}

.archive-title{
    font-size:20px;

    margin-bottom:8px;

    font-weight:bold;

    line-height:1.4;
}

.archive-text{
    opacity:0.85;

    line-height:1.6;

    margin-bottom:12px;

    font-size:13px;
}

/* ---------- BUTTON ---------- */

.archive-button{
    display:flex;

    align-items:center;
    justify-content:center;

    width:100%;

    height:44px;

    border-radius:12px;

    background:#101010;

    border:1px solid rgba(255,255,255,0.12);

    color:white;

    text-decoration:none;

    font-size:13px;
    font-weight:bold;

    transition:0.25s;

    box-sizing:border-box;
}

.archive-button:hover{
    border-color:#00aaff;

    transform:translateY(-2px);

    background:#151515;
}

/* ---------- BACK ---------- */

.back{
    max-width:520px;
    margin:auto;
    padding:0 14px 10px;
}

.back a{
    color:#aaa;
    text-decoration:none;
    font-size:12px;
}

/* ---------- FOOTER ---------- */

footer{
    padding:18px 10px;

    text-align:center;

    opacity:0.4;

    font-size:10px;
}
