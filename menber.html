<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<meta name="description"
content="りずにゃんクラブ メンバー紹介">
<title>
りずにゃんクラブ | メンバー紹介
</title>
<style>
html{
    scroll-behavior:smooth;
}
*{
    box-sizing:border-box;
}
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}
/* ---------- SECTION ---------- */
.section{
    padding:34px 16px;
    max-width:720px;
    margin:auto;
}
.section h2{
    font-size:clamp(34px, 9vw, 54px);
    margin-top:0;
    margin-bottom:18px;
    border-left:5px solid #00aaff;
    padding-left:12px;
    line-height:1.1;
}
/* ---------- CARD ---------- */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:26px;
    margin-bottom:20px;
    backdrop-filter:blur(6px);
}
/* ---------- MESSAGE ---------- */
.message{
    font-size:18px;
    line-height:2;
    text-align:center;
    padding:20px 0;
    opacity:0.9;
}
/* ---------- BUTTON ---------- */
.link-button{
    width:100%;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#101010;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:bold;
    margin-top:18px;
    transition:0.25s;
}
.link-button:hover{
    border-color:#00aaff;
    background:#151515;
}
/* ---------- FOOTER ---------- */
footer{
    padding:30px 10px;
    text-align:center;
    opacity:0.45;
    font-size:11px;
}
</style>
</head>
<body>
<div class="section">
    <h2>
        メンバー紹介
    </h2>
    <div class="card">
        <div class="message">
            誠意製作中です。
        </div>
        <a class="link-button"
        href="./index.html#about">
        トップへ戻る
        </a>
    </div>
</div>
<footer>
    © rizunyan club
</footer>
</body>
</html>
